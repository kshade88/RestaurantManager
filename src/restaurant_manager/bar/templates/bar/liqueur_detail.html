{% extends "base.html" %}

{% block content %}
<div>
    <h1>{{ liqueur.product }}</h1>
    <p>{{ liqueur.brand }}</p>
    <p>Origin: {{ liqueur.origin }}</p>
    <p>Proof: {{ liqueur.proof }}</p>
    <p>Detail Category: {{ liqueur.detail_category }}</p>
    <p>Notes: {{ liqueur.notes }}</p>
    <a href="{% url "liqueur-update" liqueur.pk %}">Edit</a>
    <a href="{% url "liqueur-delete" liqueur.pk %}">Delete</a>
</div>
{% endblock content %}
