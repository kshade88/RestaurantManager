{% extends "base.html" %}

{% block content %}
<div>
    <h1>Wine List</h1>
    <a href="{% url 'wine-create' %}">Add New Wine</a>
    <ul>
        {% for wine in wines %}
            <li><a href="{% url 'wine-detail' wine.pk %}">{{ wine.product }}</a></li>
        {% endfor %}
    </ul>
</div>
{% endblock content %}
