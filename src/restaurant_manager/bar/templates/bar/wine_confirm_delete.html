{% extends "base.html" %}

{% block content %}
<div>
    <h1>Confirm Delete</h1>
    <p>Are you sure you want to delete {{ wine.product }}?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
        <a href="{% url 'wine-detail' wine.pk %}">Cancel</a>
    </form>
</div>
{% endblock content %}
