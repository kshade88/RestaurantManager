{% extends "base.html" %}

{% block title %}Garnishes{% endblock title %}

{% block content %}
    <h2>Garnishes</h2>
    <a href="{% url "garnish-create" %}">Add New Garnish</a>
    <ul>
        {% for garnish in garnishes %}
            <li><a href="{% url "garnish-detail" garnish.pk %}">{{ garnish.product }}</a></li>
        {% endfor %}
    </ul>
{% endblock content %}
