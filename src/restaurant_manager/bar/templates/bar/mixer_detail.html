{% extends "base.html" %}

{% block content %}
<div>
    <h1>{{ mixer.product }}</h1>
    {% if mixer.brand %}
    <p>Brand: {{ mixer.brand }}</p>
    {% endif %}
    {% if mixer.made_in_house %}
    <p>Made in house</p>
    {% endif %}
    <p>Notes: {{ mixer.notes }}</p>
    <a href="{% url 'mixer-update' mixer.pk %}">Edit</a>
    <a href="{% url 'mixer-delete' mixer.pk %}">Delete</a>
</div>
{% endblock content %}
