<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Bar Manager - Manage your bar inventory including spirits, wines, beers, liqueurs, mixers, ingredients, and garnishes.">
        <meta name="keywords" content="bar, inventory, spirits, wines, beers, liqueurs, mixers, ingredients, garnishes">
        <title>{% block title %}Bar Manager{% endblock title %}</title>
    </head>
    <body>
        <header>
            <h1>{% block header %}<a href="{% url 'dashboard' %}">Bar Manager</a>{% endblock header %}</h1>
            <div>
                {% block navigation %}
                    <nav>
                        <ul>
                            <li><a href="{% url 'spirit-list' %}">Spirits</a></li>
                            <li><a href="{% url 'wine-list' %}">Wines</a></li>
                            <li><a href="{% url 'beer-list' %}">Beers</a></li>
                            <li><a href="{% url 'liqueur-list' %}">Liqueurs</a></li>
                            <li><a href="{% url 'mixer-list' %}">Mixers</a></li>
                            <li><a href="{% url 'ingredient-list' %}">Ingredients</a></li>
                            <li><a href="{% url 'garnish-list' %}">Garnishes</a></li>
                        </ul>
                    </nav>
                {% endblock navigation %}
            </div>
        </header>
        <main>
            {% block content %}
            {% endblock content %}            
        </main>
    </body>
</html>
